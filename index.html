<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Interactive Calculator</title>
</head>
<body>
    <div id="calculator">
        <div id="display">
            
        </div>
        <table id="buttons">
            <tr>
                <td><button class="percent" data-value="percent">%</td>
                <td><button class="squarert" data-value="squarert">&radic;</button></td>
                <td><button class="delete" data-value="DEL">DEL</button></td>
                <td><button class="allclear" data-value="AC">AC</button></td>
            </tr>

            <tr>
                <td><button class="seven" data-value="7">7</button></td>
                <td><button class="eight" data-value="8">8</button></td>
                <td><button class="nine" data-value="9">9</button></td>
                <td><button class="minus" data-value="-">-</button></td>
            </tr>

            <tr>
                <td><button class="four" data-value="4">4</button></td>
                <td><button class="five" data-value="5">5</button></td>
                <td><button class="six" data-value="6">6</button></td>
                <td><button class="divide" data-value="/">&divide;</button></td>
            </tr>

            <tr>
                <td><button class="one" data-value="1">1</button></td>
                <td><button class="two" data-value="2">2</button></td>
                <td><button class="three" data-value="3">3</button></td>
                <td><button class="multiply" data-value="*">x</button></td>
            </tr>

            <tr>
                <td><button class="zero" data-value="0">0</button></td>
                <td><button class="decimal" data-value=".">.</button></td>
                <td><button class="equals" data-value="=">=</button></td>
                <td><button class="plus" data-value="+">+</button></td>
            </tr>     
            
        </table>
    </div>
<script src="script.js"></script>
</body>
</html>
