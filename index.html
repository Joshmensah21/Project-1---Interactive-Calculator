<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Interactive Calculator</title>
</head>
<body>
    <div id="calculator">
        <div id="display">
            
        </div>
        <div id="buttons">
            <button class="clear-button" data-value="AC">AC</button>
            <button class="plus-button" data-value="+">+</button>
            <button class="minus-button" data-value="-">-</button>
            <button class="multiply-button" data-value="*">*</button>
            <button class="divide-button" data-value="/">/</button>
            <button class="equals-button" data-value="=">=</button>
            <button class="decimal-button" data-value=".">.</button>
            <button class="zero-button" data-value="0">0</button>
            <button class="one-button" data-value="1">1</button>
            <button class="two-button" data-value="2">2</button>
            <button class="three-button" data-value="3">3</button>
            <button class="four-button" data-value="4">4</button>
            <button class="five-button" data-value="5">5</button>
            <button class="six-button" data-value="6">6</button>
            <button class="seven-button" data-value="7">7</button>
            <button class="eight-button" data-value="8">8</button>
            <button class="nine-button" data-value="9">9</button>
        </div>
    </div>
<script src="script.js"></script>
</body>
</html>
